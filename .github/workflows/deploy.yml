# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Remove husky prepare script
        run: npm pkg delete scripts.prepare

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps > install-log.txt 2>&1 || true

      - name: Build project
        run: npm run build > build-log.txt 2>&1 || true

      - name: Debug Output
        run: |
          ls -la > ls-log.txt 2>&1 || true
          ls -la dist >> ls-log.txt 2>&1 || true

      - name: Commit build logs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add install-log.txt build-log.txt ls-log.txt
          git commit -m "chore: add debug logs [skip ci]" || true
          git push || true

      - name: Check build success
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed, dist folder not found!"
            exit 1
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
